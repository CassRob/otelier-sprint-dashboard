}

const FULL={};
for(const key of Object.keys(PROJECT_META)){
  const raw=RAW[key]||{};
  FULL[key]={c:[],d:[],co:[],sc:[],cc:[],dc:[],coc:[]};
  for(const s of SCHEDULE){const e=raw[s.num];if(!e){FULL[key].c.push(0);FULL[key].d.push(0);FULL[key].co.push(0);FULL[key].sc.push(0);FULL[key].cc.push(C_FUTURE);FULL[key].dc.push(C_FUTURE);FULL[key].coc.push(C_FUTURE);}else{const co=e[4]||0;FULL[key].c.push(e[0]);FULL[key].d.push(e[1]);FULL[key].co.push(co);FULL[key].sc.push(e[3]||0);FULL[key].cc.push(e[2]==='active'?C_COMMITTED_ACTIVE:C_COMMITTED);FULL[key].dc.push(e[2]==='active'?C_DELIVERED_ACTIVE:C_DELIVERED);FULL[key].coc.push(e[2]==='active'?C_CARRY_ACTIVE:co>0?C_CARRY:C_FUTURE);}}
}

function getIndices(v){const cur=ACTIVE_SPRINT_IDX,tot=SCHEDULE.length;
  if(v==='ytd')return Array.from({length:cur+1},(_,i)=>i);
  if(v==='all')return Array.from({length:tot},(_,i)=>i);
  if(v==='last6'){const s=Math.max(0,cur-5);return Array.from({length:cur-s+1},(_,i)=>s+i);}
  if(v==='last3'){const s=Math.max(0,cur-2);return Array.from({length:cur-s+1},(_,i)=>s+i);}
  const idx=SCHEDULE.findIndex(s=>s.num===v);return idx>=0?[idx]:[];
}
function updateMeta(key,indices){const raw=RAW[key]||{};const sk=key.replace(/\s+/g,'-');let c=0,d=0,sc=0;
  for(const i of indices){const e=raw[SCHEDULE[i].num];if(e&&e[2]==='closed'){c+=e[0];d+=e[1];sc+=(e[3]||0);}}
  const r=c>0?Math.round(d/c*100)+'%':'â';
  const ec=document.getElementById(`meta-c-${sk}`),ed=document.getElementById(`meta-d-${sk}`),er=document.getElementById(`meta-r-${sk}`),es=document.getElementById(`meta-s-${sk}`);
  if(ec)ec.textContent=c>0?Math.round(c).toLocaleString():'â';if(ed)ed.textContent=d>0?Math.round(d).toLocaleString():'â';if(er)er.textContent=r;if(es)es.textContent=sc>0?sc.toLocaleString()+' pts':'â';
}
function updateSummary(indices){let tc=0,td=0;const closed=new Set();
  for(const raw of Object.values(RAW)){for(const i of indices){const e=raw[SCHEDULE[i].num];if(e&&e[2]==='closed'){tc+=e[0];td+=e[1];closed.add(SCHEDULE[i].num);}}}
  const r=tc>0?Math.round(td/tc*100):0;
  document.getElementById('stat-committed').textContent=Math.round(tc).toLocaleString()+' pts';
  document.getElementById('stat-delivered').textContent=Math.round(td).toLocaleString()+' pts';
  document.getElementById('stat-rate').textContent=r+'%';
  document.getElementById('stat-sprints').textContent=`${indices.length} sprint${indices.length!==1?'s':''} (${closed.size} closed)`;
}
function applyFilter(v){
  const indices=getIndices(v);
  const px=Math.max(36,Math.min(80,Math.floor(800/Math.max(1,indices.length))));
  const w=Math.max(600,indices.length*px);
  for(const[key,chart] of Object.entries(CHART_INSTANCES)){
    chart.data.labels=indices.map(i=>ALL_LABELS[i]);chart.data._scheduleSlice=indices.map(i=>SCHEDULE[i]);chart.data._scopeCreep=indices.map(i=>FULL[key].sc[i]);
    chart.data.datasets[0].data=indices.map(i=>FULL[key].c[i]);chart.data.datasets[0].backgroundColor=indices.map(i=>FULL[key].cc[i]);
    chart.data.datasets[1].data=indices.map(i=>FULL[key].d[i]);chart.data.datasets[1].backgroundColor=indices.map(i=>FULL[key].dc[i]);
    chart.data.datasets[2].data=indices.map(i=>FULL[key].co[i]);chart.data.datasets[2].backgroundColor=indices.map(i=>FULL[key].coc[i]);
    chart.canvas.width=w;chart.update();updateMeta(key,indices);
  }
  updateSummary(indices);
  document.getElementById('filterPill').textContent=`${indices.length} sprint${indices.length!==1?'s':''} shown`;
  if(typeof currentView!=='undefined'&&currentView==='table')buildTable(indices);
}
function buildTable(indices){
  const teams=Object.keys(PROJECT_META);
  let h='<table class="data-table"><thead><tr><th class="th-sprint" rowspan="2">Sprint</th>';
  for(const t of teams)h+=`<th class="th-team" colspan="5">${PROJECT_META[t].name}</th>`;
  h+='</tr><tr>';
  for(const t of teams)h+='<th class="h-c">Committed</th><th class="h-d">Delivered</th><th class="h-co">Carried Over</th><th class="h-sc">+Added</th><th class="h-r">Rate</th>';
  h+='</tr></thead><tbody>';
  for(const i of indices){
    const s=SCHEDULE[i],active=i===ACTIVE_SPRINT_IDX;
    h+=`<tr${active?' class="active-row"':''}><td class="td-sprint">${s.label}${s.note?` <span style="color:#6554c0;font-weight:400;font-size:10px">${s.note}</span>`:''}${active?' <span style="color:#ff8b00">â</span>':''}</td>`;
    for(const t of teams){
      const e=(RAW[t]||{})[s.num];
      if(!e){h+='<td class="future">â</td><td class="future">â</td><td class="future">â</td><td class="future">â</td><td class="future">â</td>';}
      else{
        const[c,d,state,sc,co]=e,rate=c>0?Math.round(d/c*100)+'%':'â';
        const dim=state==='active'?'style="opacity:.6"':'';
        h+=`<td class="c-val" ${dim}>${c||'â'}</td><td class="d-val" ${dim}>${d||'â'}</td><td class="${(co||0)>0?'co-val':'future'}" ${dim}>${co||'â'}</td><td class="${(sc||0)>0?'sc-val':'future'}" ${dim}>${sc||'â'}</td><td class="r-val" ${dim}>${rate}</td>`;
      }
    }
    h+='</tr>';
  }
  // Totals row (closed sprints only)
  h+='<tr style="border-top:2px solid #dfe1e6;font-weight:700;background:#f8f9fb"><td class="td-sprint" style="background:#e8eaf0">Totals (closed)</td>';
  for(const t of teams){
    let tc=0,td=0,tco=0,tsc=0;
    for(const i of indices){const e=(RAW[t]||{})[SCHEDULE[i].num];if(e&&e[2]==='closed'){tc+=e[0];td+=e[1];tsc+=(e[3]||0);tco+=(e[4]||0);}}
    const tr=tc>0?Math.round(td/tc*100)+'%':'â';
    h+=`<td class="c-val">${tc||'â'}</td><td class="d-val">${td||'â'}</td><td class="${tco>0?'co-val':'future'}">${tco||'â'}</td><td class="${tsc>0?'sc-val':'future'}">${tsc||'â'}</td><td class="r-val">${tr}</td>`;
  }
  h+='</tr></tbody></table>';
  document.getElementById('tableWrap').innerHTML=h;
}
let currentView='charts';
function setView(v){
  currentView=v;
  document.getElementById('cards').style.display=v==='charts'?'':'none';
  document.getElementById('tableWrap').style.display=v==='table'?'':'none';
  document.getElementById('btnCharts').classList.toggle('active',v==='charts');
  document.getElementById('btnTable').classList.toggle('active',v==='table');
  if(v==='table')buildTable(getIndices(document.getElementById('sprintFilter').value));
}
document.getElementById('sprintFilter').addEventListener('change',function(){applyFilter(this.value);});
applyFilter('ytd');
</script>
